<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #05070a; }
      .border { fill: none; stroke: #21262d; stroke-width: 1.5; }
      .grid { stroke: #161b22; stroke-width: 0.5; }
      .panel-border { fill: none; stroke: #30363d; stroke-width: 1; }
      .text-primary { fill: #f0f6fc; font-family: 'Share Tech Mono', monospace; font-size: 13px; }
      .text-muted { fill: #8b949e; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
      .text-accent { fill: #ffffff; font-family: 'Share Tech Mono', monospace; font-weight: bold; font-size: 13px; }
      .status-dot { fill: #2ea043; }
      .pothole-box { fill: none; stroke: #ffffff; stroke-width: 1.5; stroke-dasharray: 4 2; }
      .progress-bg { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .progress-bar { fill: #ffffff; }
      .critical-tag { fill: none; stroke: #ffffff; stroke-width: 1; }
      .critical-text { fill: #ffffff; font-family: 'Share Tech Mono', monospace; font-size: 9px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="bg"/>

  <!-- Grid lines -->
  <g opacity="0.8">
    <line x1="0" y1="50" x2="800" y2="50" class="grid"/>
    <line x1="0" y1="100" x2="800" y2="100" class="grid"/>
    <line x1="0" y1="150" x2="800" y2="150" class="grid"/>
    <line x1="0" y1="200" x2="800" y2="200" class="grid"/>
    <line x1="0" y1="250" x2="800" y2="250" class="grid"/>
    <line x1="0" y1="300" x2="800" y2="300" class="grid"/>
    <line x1="0" y1="350" x2="800" y2="350" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="400" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="400" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="400" class="grid"/>
    <line x1="400" y1="0" x2="400" y2="400" class="grid"/>
    <line x1="500" y1="0" x2="500" y2="400" class="grid"/>
    <line x1="600" y1="0" x2="600" y2="400" class="grid"/>
    <line x1="700" y1="0" x2="700" y2="400" class="grid"/>
  </g>

  <!-- Outer Border -->
  <rect width="800" height="400" class="border"/>

  <!-- Header -->
  <g transform="translate(20, 30)">
    <text x="0" y="0" class="text-accent" font-size="14">// SYSTEM: NAGARSEVAK // CIVIC_DASHBOARD_v1.0</text>
    <text x="580" y="0" class="text-muted">HOST: citizenz.vercel.app</text>
    <circle cx="750" cy="-4" r="5" class="status-dot"/>
    <text x="760" y="0" fill="#2ea043" font-family="'Share Tech Mono', monospace" font-size="11px">ONLINE</text>
    <line x1="0" y1="12" x2="760" y2="12" stroke="#30363d" stroke-width="1"/>
  </g>

  <!-- Left Panel: Incident Log -->
  <g transform="translate(20, 65)">
    <rect width="360" height="310" class="panel-border" rx="2"/>
    <text x="15" y="25" class="text-accent" font-size="12">[ INCIDENT_TICKET_LOG ]</text>
    <line x1="15" y1="35" x2="345" y2="35" stroke="#21262d" stroke-width="0.8"/>

    <!-- Incident 1 -->
    <g transform="translate(15, 55)">
      <text x="0" y="12" class="text-primary">TICKET #NMC-802: ROAD_POTHOLE</text>
      <text x="0" y="27" class="text-muted">LOC: Sector 12, Kharghar | status: DISPATCHED</text>
      <rect x="290" y="2" width="50" height="15" class="critical-tag"/>
      <text x="295" y="13" class="critical-text">CRITICAL</text>
    </g>

    <!-- Incident 2 -->
    <g transform="translate(15, 115)">
      <text x="0" y="12" class="text-primary">TICKET #NMC-801: STREETLIGHT_FAIL</text>
      <text x="0" y="27" class="text-muted">LOC: Sector 20, Kharghar | status: SOLVED</text>
      <rect x="290" y="2" width="50" height="15" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="298" y="13" class="text-muted" font-size="9px">NORMAL</text>
    </g>

    <!-- Incident 3 -->
    <g transform="translate(15, 175)">
      <text x="0" y="12" class="text-primary">TICKET #NMC-799: SEWAGE_OVERFLOW</text>
      <text x="0" y="27" class="text-muted">LOC: Sector 4, Kharghar  | status: IN_QUEUE</text>
      <rect x="290" y="2" width="50" height="15" fill="none" stroke="#8b949e" stroke-width="0.8"/>
      <text x="303" y="13" fill="#8b949e" font-family="'Share Tech Mono', monospace" font-size="9px">HIGH</text>
    </g>

    <!-- Incident 4 -->
    <g transform="translate(15, 235)">
      <text x="0" y="12" class="text-primary">TICKET #NMC-798: WATER_LEAKAGE</text>
      <text x="0" y="27" class="text-muted">LOC: Sector 15, Kharghar | status: INVESTIGATING</text>
      <rect x="290" y="2" width="50" height="15" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="298" y="13" class="text-muted" font-size="9px">MEDIUM</text>
    </g>
  </g>

  <!-- Right Panel: AI Vision diagnostic -->
  <g transform="translate(400, 65)">
    <rect width="380" height="310" class="panel-border" rx="2"/>
    <text x="15" y="25" class="text-accent" font-size="12">[ AI_VISION_DAMAGE_DIAGNOSTIC ]</text>
    <line x1="15" y1="35" x2="365" y2="35" stroke="#21262d" stroke-width="0.8"/>

    <!-- Pothole Image wireframe -->
    <g transform="translate(15, 55)">
      <rect width="180" height="160" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <path d="M 10,80 Q 50,20 90,80 T 170,80" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="2 2"/>
      <ellipse cx="90" cy="90" rx="35" ry="15" class="pothole-box"/>
      <text x="50" y="65" fill="#ffffff" font-family="'Share Tech Mono', monospace" font-size="10px" font-weight="bold">POTHOLE DETECTED</text>
      <text x="10" y="150" class="text-muted" font-size="9px">INPUT_IMG_NMC_802.jpg</text>
    </g>

    <!-- Stats details -->
    <g transform="translate(210, 55)">
      <text x="0" y="15" class="text-muted">OBJECT CLASSIFICATION</text>
      <text x="0" y="30" fill="#ffffff" font-family="'Share Tech Mono', monospace" font-size="12px" font-weight="bold">ROAD_STRUCTURAL_DEFECT</text>

      <text x="0" y="60" class="text-muted">ANALYSIS CONFIDENCE</text>
      <text x="0" y="75" fill="#2ea043" font-family="'Share Tech Mono', monospace" font-size="13px" font-weight="bold">98.4% [VERIFIED]</text>

      <text x="0" y="105" class="text-muted">145-RULE PRIORITY</text>
      <text x="0" y="120" fill="#ffffff" font-family="'Share Tech Mono', monospace" font-size="12px" font-weight="bold">CRITICAL_SAFETY_THREAT</text>

      <text x="0" y="150" class="text-muted">DISPATCH TARGET</text>
      <text x="0" y="165" class="text-primary">ROAD_MAINTENANCE_DIV_C</text>
    </g>

    <!-- Scheduling Telemetry Progress -->
    <g transform="translate(15, 235)">
      <text x="0" y="12" class="text-accent">PRIORITY QUEUE SCHEDULER</text>
      <rect x="0" y="22" width="350" height="10" class="progress-bg" rx="2"/>
      <rect x="0" y="22" width="330" height="10" class="progress-bar" rx="2"/>
      <text x="0" y="48" class="text-muted">TIME TO RESOLVE: EST &lt; 24 HOURS</text>
      <text x="250" y="48" class="text-accent">LOAD METRIC: 94.3%</text>
    </g>
  </g>
</svg>
