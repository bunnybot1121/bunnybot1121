<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@600&amp;display=swap');
      
      .bg { fill: #000408; }
      .border-panel { fill: none; stroke: #003355; stroke-width: 1; }
      
      .text-primary { fill: #00BFFF; font-family: 'Share Tech Mono', monospace; }
      .text-accent { fill: #00FFFF; font-family: 'Share Tech Mono', monospace; text-shadow: 0 0 5px rgba(0, 255, 255, 0.4); }
      .text-muted { fill: #005577; font-family: 'Share Tech Mono', monospace; }
      .text-title { fill: #ffffff; font-family: 'Orbitron', sans-serif; font-weight: 600; filter: drop-shadow(0 0 1px #ffffff); }
      
      .pulse-slow { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.4; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="120" class="bg"/>
  
  <!-- Subtle Grid lines -->
  <line x1="30" y1="0" x2="30" y2="120" stroke="#001830" stroke-width="0.5" opacity="0.6"/>
  <line x1="870" y1="0" x2="870" y2="120" stroke="#001830" stroke-width="0.5" opacity="0.6"/>

  <!-- Panel Borders -->
  <rect x="15" y="10" width="870" height="100" class="border-panel" rx="3"/>

  <!-- ═══ DATA ICON / LEDGER SYMBOL (LEFT) ═══ -->
  <g transform="translate(35, 25)">
    <rect x="0" y="5" width="40" height="50" fill="none" stroke="#00FFFF" stroke-width="1.2" rx="2" filter="drop-shadow(0 0 2px #00FFFF)"/>
    <line x1="8" y1="18" x2="32" y2="18" stroke="#00FFFF" stroke-width="1"/>
    <line x1="8" y1="28" x2="24" y2="28" stroke="#00FFFF" stroke-width="1"/>
    <line x1="8" y1="38" x2="28" y2="38" stroke="#00FFFF" stroke-width="1"/>
    <circle cx="28" cy="42" r="2" fill="#00FFFF" class="pulse-slow"/>
  </g>

  <!-- ═══ RESEARCH INFORMATION (CENTER) ═══ -->
  <g transform="translate(100, 20)">
    <!-- Section Header -->
    <text x="0" y="12" class="text-accent" font-size="9px" letter-spacing="1.5px">// ACADEMIC RECORD: CO-AUTHORED RESEARCH PAPER //</text>
    
    <!-- Title -->
    <text x="0" y="32" class="text-title" font-size="12px" letter-spacing="0.5px">A SAFETY-WEIGHTED PRIORITY FRAMEWORK FOR MUNICIPAL COMPLAINTS</text>
    
    <!-- Description -->
    <text x="0" y="50" class="text-primary" font-size="11px">Proposed a 145-rule AI engine classifying and routing civic reports via safety heuristics.</text>
    
    <!-- Technical tags -->
    <g transform="translate(0, 68)" font-family="Share Tech Mono, monospace" font-size="9.5px">
      <text x="0" y="10" class="text-muted">KEYWORDS: </text>
      <text x="65" y="10" class="text-accent">[ AI SYSTEMS ]</text>
      <text x="160" y="10" class="text-accent">[ CIVIC TECH ]</text>
      <text x="255" y="10" class="text-accent">[ RULE ENGINE ]</text>
      <text x="360" y="10" class="text-accent">[ SCHEDULING ]</text>
    </g>
  </g>

  <!-- ═══ STATUS & METRICS (RIGHT) ═══ -->
  <g transform="translate(680, 20)">
    <!-- Vertical divider inside panel -->
    <line x1="-15" y1="5" x2="-15" y2="75" stroke="#003355" stroke-width="1"/>
    
    <text x="0" y="12" class="text-muted" font-size="8.5px" letter-spacing="1px">DEPLOYMENT PROTOCOL</text>
    
    <!-- Status badge -->
    <rect x="0" y="20" width="180" height="20" fill="#001525" stroke="#003355" stroke-width="1" rx="2"/>
    <text x="10" y="33" fill="#00FF41" font-family="Share Tech Mono, monospace" font-size="9.5px" font-weight="bold" filter="drop-shadow(0 0 2px #00FF41)">● ACTIVE // NMMC, KHARGHAR</text>

    <!-- Integrity Status -->
    <text x="0" y="58" class="text-muted" font-size="8.5px" letter-spacing="1px">LEDGER INTEGRITY: VERIFIED</text>
    <rect x="0" y="66" width="120" height="5" fill="#000d1a" rx="1.5" stroke="#003355" stroke-width="0.5"/>
    <rect x="0" y="66" width="120" height="5" fill="#00FFFF" rx="1.5"/>
  </g>
</svg>
