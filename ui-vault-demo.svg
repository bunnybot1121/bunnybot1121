<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #FDF6EC; }
      .border { fill: none; stroke: #EBDCB9; stroke-width: 1.5; }
      .grid { stroke: #FFEAD2; stroke-width: 0.5; opacity: 0.8; }
      .panel-border { fill: none; stroke: #EBDCB9; stroke-width: 1; }
      .text-primary { fill: #4A2F13; font-family: 'Share Tech Mono', monospace; font-size: 13px; }
      .text-muted { fill: #8A6F53; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
      .text-accent { fill: #D06A1A; font-family: 'Share Tech Mono', monospace; font-weight: bold; font-size: 13px; }
      .status-dot { fill: #D06A1A; }
      
      /* Neo-brutalist component styles with cozy colors */
      .nb-button { fill: #FFEAD2; stroke: #4A2F13; stroke-width: 2.5; }
      .nb-button-shadow { fill: #4A2F13; }
      .nb-card { fill: #ffffff; stroke: #4A2F13; stroke-width: 2.5; }
      .nb-card-shadow { fill: #4A2F13; }
      .slider-fill { fill: #D06A1A; }
      .slider-handle { fill: #ffffff; stroke: #4A2F13; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="bg"/>

  <!-- Grid lines -->
  <g opacity="0.8">
    <line x1="0" y1="50" x2="800" y2="50" class="grid"/>
    <line x1="0" y1="100" x2="800" y2="100" class="grid"/>
    <line x1="0" y1="150" x2="800" y2="150" class="grid"/>
    <line x1="0" y1="200" x2="800" y2="200" class="grid"/>
    <line x1="0" y1="250" x2="800" y2="250" class="grid"/>
    <line x1="0" y1="300" x2="800" y2="300" class="grid"/>
    <line x1="0" y1="350" x2="800" y2="350" class="grid"/>
    <line x1="100" y1="0" x2="100" y2="400" class="grid"/>
    <line x1="200" y1="0" x2="200" y2="400" class="grid"/>
    <line x1="300" y1="0" x2="300" y2="400" class="grid"/>
    <line x1="400" y1="0" x2="400" y2="400" class="grid"/>
    <line x1="500" y1="0" x2="500" y2="400" class="grid"/>
    <line x1="600" y1="0" x2="600" y2="400" class="grid"/>
    <line x1="700" y1="0" x2="700" y2="400" class="grid"/>
  </g>

  <!-- Outer Border -->
  <rect width="800" height="400" class="border"/>

  <!-- Header -->
  <g transform="translate(20, 30)">
    <text x="0" y="0" class="text-accent" font-size="14">// SYSTEM: UIVAULT // NEO_BRUTALIST_UI_LIBRARY</text>
    <text x="540" y="0" class="text-muted">HOST: uivault1121.vercel.app</text>
    <circle cx="710" cy="-4" r="5" class="status-dot"/>
    <text x="720" y="0" fill="#D06A1A" font-family="'Share Tech Mono', monospace" font-size="11px">CORE_ONLINE</text>
    <line x1="0" y1="12" x2="760" y2="12" stroke="#EBDCB9" stroke-width="1.5"/>
  </g>

  <!-- Left Panel: Component Previews -->
  <g transform="translate(20, 65)">
    <rect width="360" height="310" class="panel-border" rx="2"/>
    <text x="15" y="25" class="text-accent" font-size="12">[ COMPONENT_STAGE_PREVIEW ]</text>
    <line x1="15" y1="35" x2="345" y2="35" stroke="#EBDCB9" stroke-width="0.8"/>

    <!-- Neo-brutalist Button -->
    <g transform="translate(40, 60)">
      <!-- Button Shadow -->
      <rect x="6" y="6" width="160" height="40" class="nb-button-shadow"/>
      <!-- Button Body -->
      <rect width="160" height="40" class="nb-button"/>
      <!-- Button Text -->
      <text x="42" y="24" fill="#4A2F13" font-family="'Share Tech Mono', monospace" font-weight="900" font-size="14px">CLICK_ME!</text>
    </g>

    <!-- Neo-brutalist Card -->
    <g transform="translate(40, 140)">
      <!-- Card Shadow -->
      <rect x="6" y="6" width="270" height="120" class="nb-card-shadow"/>
      <!-- Card Body -->
      <rect width="270" height="120" class="nb-card"/>
      <!-- Card Header -->
      <rect width="270" height="26" fill="#FFEAD2" stroke="#4A2F13" stroke-width="1.5"/>
      <text x="10" y="18" fill="#4A2F13" font-family="'Share Tech Mono', monospace" font-weight="900" font-size="12px">system_notification.exe</text>
      <!-- Card Content -->
      <text x="15" y="55" class="text-primary" font-size="11px">NEO-BRUTALISM IS BOLD.</text>
      <text x="15" y="75" class="text-primary" font-size="11px">Thick borders, high contrast,</text>
      <text x="15" y="95" class="text-primary" font-size="11px">and zero boring layouts.</text>
    </g>
  </g>

  <!-- Right Panel: Customizer Panel -->
  <g transform="translate(400, 65)">
    <rect width="380" height="310" class="panel-border" rx="2"/>
    <text x="15" y="25" class="text-accent" font-size="12">[ CUSTOMIZATION_ENGINE ]</text>
    <line x1="15" y1="35" x2="365" y2="35" stroke="#EBDCB9" stroke-width="0.8"/>

    <!-- Sliders and parameters -->
    <g transform="translate(15, 60)">
      <!-- Parameter 1 -->
      <text x="0" y="10" class="text-muted">BORDER_WIDTH: 3px</text>
      <rect x="0" y="20" width="350" height="4" fill="#FFEAD2" rx="2"/>
      <rect x="0" y="20" width="220" height="4" class="slider-fill" rx="2"/>
      <circle cx="220" cy="22" r="5" class="slider-handle"/>

      <!-- Parameter 2 -->
      <text x="0" y="55" class="text-muted">SHADOW_OFFSET: 6px</text>
      <rect x="0" y="65" width="350" height="4" fill="#FFEAD2" rx="2"/>
      <rect x="0" y="65" width="280" height="4" class="slider-fill" rx="2"/>
      <circle cx="280" cy="67" r="5" class="slider-handle"/>

      <!-- Parameter 3 -->
      <text x="0" y="100" class="text-muted">SHADOW_DIRECTION: BOTTOM_RIGHT</text>
      <text x="0" y="118" class="text-accent">ANGLE: 45.0 deg (FIXED)</text>

      <!-- Parameter 4 -->
      <text x="0" y="150" class="text-muted">COLOR_THEME_SELECT</text>
      <rect x="0" y="160" width="160" height="24" fill="#FFEAD2" stroke="#4A2F13" stroke-width="1.5"/>
      <text x="10" y="176" fill="#4A2F13" font-family="'Share Tech Mono', monospace" font-size="11px" font-weight="bold">COZY_CREAM_&amp;_ORANGE</text>
      
      <rect x="175" y="160" width="160" height="24" fill="none" stroke="#EBDCB9" stroke-width="1"/>
      <text x="195" y="176" class="text-muted" font-size="11px">PURE_BLACK_&amp;_WHITE</text>
    </g>

    <!-- Lib stats -->
    <g transform="translate(15, 230)" font-size="11px">
      <text x="0" y="15" class="text-muted">TOTAL_COMPONENTS: 41+</text>
      <text x="0" y="30" class="text-muted">LIBRARY_WEIGHT   : 12.4 kB (Gzipped)</text>
      <text x="0" y="45" class="text-muted">DEPENDENCIES     : 0 (Zero external libs)</text>
      <text x="0" y="60" class="text-muted">RENDER_SPEED     : Sub-1ms compilation</text>
    </g>
  </g>
</svg>
