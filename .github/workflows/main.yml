name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ffffff&color_dots[]=1a1a1a&color_dots[]=333333&color_dots[]=555555&color_dots[]=888888&color_dots[]=cccccc
            dist/github-contribution-grid-snake-dark.svg?color_snake=ffffff&color_dots[]=111111&color_dots[]=2a2a2a&color_dots[]=444444&color_dots[]=777777&color_dots[]=aaaaaa

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
